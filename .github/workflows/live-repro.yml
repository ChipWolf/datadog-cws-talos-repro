name: Reproduce CWS kprobe failure on Talos

on:
  workflow_dispatch:
    inputs:
      talos_version:
        description: "Talos version"
        default: "v1.12.5"
      debug:
        description: "Open tmate SSH session after capture"
        type: boolean
        default: false

env:
  TALOS_VERSION: ${{ inputs.talos_version || 'v1.12.5' }}

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bail if no KVM
        run: test -e /dev/kvm

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 qemu-utils iptables
          curl -fsSL "https://github.com/siderolabs/talos/releases/download/$TALOS_VERSION/talosctl-linux-amd64" \
            -o /usr/local/bin/talosctl && chmod +x /usr/local/bin/talosctl
          curl -fsSL "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Prepare networking
        run: |
          sudo mkdir -p /var/run/netns
          sudo modprobe tun 2>/dev/null || true
          sudo sysctl -w net.bridge.bridge-nf-call-iptables=0 2>/dev/null || true
          sudo sysctl -w net.bridge.bridge-nf-call-ip6tables=0 2>/dev/null || true
          sudo iptables -P FORWARD ACCEPT 2>/dev/null || true

      - name: Download Talos boot assets
        run: |
          mkdir -p _out
          curl -fSL -o _out/vmlinuz-amd64 \
            "https://github.com/siderolabs/talos/releases/download/$TALOS_VERSION/vmlinuz-amd64"
          curl -fSL -o _out/initramfs-amd64.xz \
            "https://github.com/siderolabs/talos/releases/download/$TALOS_VERSION/initramfs-amd64.xz"

      - name: Boot Talos cluster
        timeout-minutes: 15
        run: |
          sudo --preserve-env=HOME talosctl cluster create \
            --provisioner=qemu --controlplanes=1 --workers=0 \
            --cpus=2 --memory=4096 --disk=10240 \
            --wait-timeout=10m --talos-version="$TALOS_VERSION"
          sudo chown -R "$(id -u):$(id -g)" ~/.kube ~/.talos

      - name: Deploy Datadog Agent with CWS
        run: |
          kubectl label namespace default pod-security.kubernetes.io/enforce=privileged --overwrite
          helm repo add datadog https://helm.datadoghq.com && helm repo update
          kubectl create secret generic dd-keys \
            --from-literal=api-key=0000000000000000000000000000dead \
            --from-literal=app-key=0000000000000000000000000000dead
          helm install datadog datadog/datadog -f values.yaml --timeout=300s

      - name: Wait for agent pod
        run: |
          # Do not wait on condition=ready: security-agent often stays NotReady until
          # runtime-security.sock exists; with CWS broken that never happens (600s timeout).
          # Cap poll at 2m: if the pod never reaches Running that quickly, scheduling/bootstrap hung.
          echo "Waiting for DaemonSet pod phase Running (max 2m)..."
          POD=""
          RUNNING=0
          for i in $(seq 1 24); do
            POD=$(kubectl get pods -l app=datadog -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "$POD" ]; then
              PHASE=$(kubectl get pod "$POD" -o jsonpath='{.status.phase}' 2>/dev/null || true)
              if [ "$PHASE" = "Running" ]; then
                echo "Pod $POD is Running (containers may still be NotReady — expected for this repro)"
                RUNNING=1
                break
              fi
            fi
            sleep 5
          done
          if [ "$RUNNING" != "1" ]; then
            echo "Timed out after 2m: no Running datadog pod (likely hung or not scheduled)"
            kubectl get pods -A -o wide || true
            [ -n "$POD" ] && kubectl describe pod "$POD" || true
            exit 1
          fi
          echo "Waiting 180s for system-probe to attempt CWS kprobe attach..."
          sleep 180

      - name: Capture and verify
        run: |
          POD=$(kubectl get pods -l app=datadog -o jsonpath='{.items[0].metadata.name}')

          echo "=== system-probe ==="
          kubectl logs "$POD" -c system-probe 2>&1 | tee /tmp/system-probe.log

          echo ""
          echo "=== security-agent ==="
          kubectl logs "$POD" -c security-agent 2>&1 | tee /tmp/security-agent.log

          echo ""
          if grep -q "attach_recursive_mnt.*not found" /tmp/system-probe.log; then
            echo "REPRODUCED: kprobe symbol mismatch confirmed"
          else
            echo "NOT REPRODUCED"
            exit 1
          fi

      - name: Debug via tmate
        if: ${{ inputs.debug }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repro-logs
          path: /tmp/*.log
          retention-days: 14

      - name: Cleanup
        if: always()
        run: sudo talosctl cluster destroy --name=talos-default 2>/dev/null || true
